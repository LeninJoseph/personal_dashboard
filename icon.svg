<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>

    <!-- Ring/Accent Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <!-- Secondary/Weather Glow Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Maskable Safe Area Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" />

  <!-- Outer Glowing Tech Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#neonGrad)" stroke-width="8" opacity="0.15" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#neonGrad)" stroke-width="3" opacity="0.4" stroke-dasharray="10, 15" />

  <!-- Glowing Sun/Clock Core representation -->
  <circle cx="256" cy="256" r="90" fill="url(#purpleGrad)" opacity="0.15" filter="url(#glow-heavy)" />

  <!-- Stylized Digital Dashboard elements -->
  <!-- Clock Hands / Compass design -->
  <g filter="url(#glow)">
    <!-- Vertical Line representing clock marker -->
    <line x1="256" y1="120" x2="256" y2="140" stroke="url(#neonGrad)" stroke-width="6" stroke-linecap="round" />
    <!-- Hour Hand -->
    <line x1="256" y1="256" x2="256" y2="170" stroke="url(#neonGrad)" stroke-width="8" stroke-linecap="round" />
    <!-- Minute Hand -->
    <line x1="256" y1="256" x2="330" y2="256" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.9" />
    <!-- Center Dot -->
    <circle cx="256" cy="256" r="10" fill="#ffffff" />
  </g>

  <!-- Weather-like Cloud Accent overlay -->
  <path d="M340 310 a35 35 0 0 1 50 0 a25 25 0 0 1 10 40 h-80 a25 25 0 0 1 20 -40 z" fill="#ffffff" opacity="0.85" filter="url(#glow)" transform="translate(-50, 40) scale(0.8)" />
</svg>
